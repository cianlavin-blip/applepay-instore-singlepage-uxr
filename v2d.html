<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Pay In-Store — UXR Round 2 RTP</title>
  <style>
    @font-face { font-family: 'Calibre'; src: url('https://www.affirm.com/fonts/src/calibre-regular.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Calibre'; src: url('https://www.affirm.com/fonts/src/calibre-medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Calibre'; src: url('https://www.affirm.com/fonts/src/calibre-semibold.woff2') format('woff2'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Axiforma for Affirm'; src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Axiforma for Affirm'; src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm-Medium.woff2') format('woff2'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Axiforma for Affirm'; src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Figma capture support -->
  <script>
    if (window.location.hash.includes('figmacapture=')) {
      var s = document.createElement('script');
      s.src = 'https://mcp.figma.com/mcp/html-to-design/capture.js';
      s.async = true;
      document.head.appendChild(s);
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: 'Calibre', system-ui, sans-serif;
    }
    .phone-wrap {
      width: 390px;
      height: 844px;
      transform-origin: center top;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #ebebed;
      border-radius: 52px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 10px #2a2a2a, 0 0 0 11px #444;
      position: relative;
    }
    ::-webkit-scrollbar { display: none; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    button:active { opacity: 0.8; }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes shimmer  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes fadeIn      { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin        { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    /* Scroll-down heading transitions */
    @keyframes slideUpOut  { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-28px)} }
    @keyframes slideUpIn   { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
    .shimmer-bg {
      background: linear-gradient(90deg, #e2e2e6 25%, #ededf1 50%, #e2e2e6 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div class="phone-wrap" id="phone-wrap">
    <div id="root"></div>
  </div>

  <script>
    function scalePhone() {
      var wrap = document.getElementById('phone-wrap');
      var availW = window.innerWidth - 48;
      var availH = window.innerHeight - 48;
      var scaleW = availW / 390;
      var scaleH = availH / 844;
      var scale = Math.min(scaleW, scaleH, 1);
      wrap.style.transform = 'scale(' + scale + ')';
      wrap.style.marginBottom = ((844 * scale) - 844) + 'px';
    }
    scalePhone();
    window.addEventListener('resize', scalePhone);
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Design tokens ───────────────────────────────────────────────
    const c = {
      bg:      '#f2f2f4',
      surface: '#ffffff',
      nav:     '#f3f4f2',
      text:    '#0c0c14',
      sub:     '#4b4b5c',
      accent:  '#000061',
      link:    '#000061',
      bdg:     '#e2e2ff',
      bdgTxt:  '#4242cf',
      div:     '#cbcbd4',
    };

    // ── Ghost card constants ────────────────────────────────────────
    const CARD_H   = 70;
    const CARD_GAP = 10;

    const DECK_POS = [
      { top: 0,   scale: 1,    opacity: 1    },
      { top: 52,  scale: 0.95, opacity: 0.88 },
      { top: 100, scale: 0.90, opacity: 0.85 },
    ];
    const SPREAD_POS = [
      { top: 0,                        scale: 1, opacity: 1 },
      { top: CARD_H + CARD_GAP,        scale: 1, opacity: 1 },
      { top: (CARD_H + CARD_GAP) * 2,  scale: 1, opacity: 1 },
    ];
    const DECK_H   = DECK_POS[2].top + CARD_H;
    const SPREAD_H = SPREAD_POS[2].top + CARD_H;

    const CARD_DEFS = [
      { w1: '60%', w2: '40%' },
      { w1: '54%', w2: '36%' },
      { w1: '66%', w2: '44%' },
    ];

    // Ghost card top positions (relative to sheet top = phone top when sheet open)
    // NavBar(129) + padding(14) + heading(36) + amount(62) + row(52) + caption(32) + gap(24) = 349
    const CARD_TOP_INPUT   = 349;
    // NavBar(129) + padding(14) + loading-h1(37) + subtitle(46) = 226
    const CARD_TOP_LOADING = 226;

    // ── Shared primitives ───────────────────────────────────────────

    function BoltIcon() {
      return (
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" style={{ flexShrink: 0 }}>
          <path fillRule="evenodd" clipRule="evenodd" d="M10.1255 0.877899C10.7474 0.78009 11.3768 1.0009 11.8014 1.46576C12.1206 1.81541 12.2079 2.32198 12.2487 2.80343C12.2918 3.31184 12.2918 3.98903 12.2918 4.83643V4.86822V6.33332C12.2918 6.69367 12.2923 6.92634 12.3068 7.10342C12.3206 7.27321 12.3442 7.33616 12.3599 7.36707C12.4198 7.48467 12.5155 7.58028 12.6331 7.6402C12.664 7.65595 12.7269 7.67949 12.8967 7.69337C13.0738 7.70783 13.3065 7.70832 13.6668 7.70832H14.1722H14.2038C14.843 7.70831 15.366 7.7083 15.7702 7.74502C16.1695 7.78129 16.5802 7.86074 16.9024 8.11793C17.3487 8.47416 17.6083 9.01433 17.6077 9.58535C17.6072 9.9976 17.4127 10.368 17.1916 10.7024C16.9677 11.041 16.641 11.4494 16.2417 11.9485L16.222 11.9731L12.3832 16.7716L12.3634 16.7964C11.834 17.4581 11.411 17.9869 11.0597 18.357C10.7271 18.7074 10.3425 19.0485 9.87478 19.1221C9.25289 19.2199 8.62342 18.9991 8.19891 18.5342C7.87961 18.1846 7.7924 17.678 7.75157 17.1965C7.70845 16.6881 7.70846 16.0109 7.70846 15.1635V15.1318V13.6667C7.70846 13.3063 7.70798 13.0736 7.69351 12.8966C7.67964 12.7268 7.65609 12.6638 7.64034 12.6329C7.58042 12.5153 7.48481 12.4197 7.36721 12.3598C7.33631 12.344 7.27336 12.3205 7.10357 12.3066C6.92648 12.2921 6.69381 12.2917 6.33346 12.2917H5.82805H5.79645C5.15723 12.2917 4.63431 12.2917 4.23011 12.255C3.83079 12.2187 3.42005 12.1392 3.09786 11.882C2.65158 11.5258 2.39196 10.9856 2.39258 10.4146C2.39302 10.0024 2.58757 9.632 2.8087 9.29753C3.03253 8.95897 3.35922 8.55063 3.75855 8.05148L3.77827 8.02683L7.61702 3.22839L7.63685 3.2036C8.16622 2.54187 8.58926 2.01307 8.94054 1.64299C9.27318 1.29255 9.65774 0.951465 10.1255 0.877899Z" fill={c.accent} />
        </svg>
      );
    }

    function HomeIndicator() {
      return (
        <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 10, paddingBottom: 18, background: c.bg, flexShrink: 0 }}>
          <div style={{ width: 134, height: 5, background: c.text, borderRadius: 3, opacity: 0.2 }} />
        </div>
      );
    }

    // ── Animated ghost card stack ───────────────────────────────────

    function AnimatedGhostStack({ spread, shimmer, entered }) {
      const positions  = spread ? SPREAD_POS : DECK_POS;
      const containerH = spread ? SPREAD_H   : DECK_H;

      return (
        <div style={{ position: 'relative', height: containerH, transition: 'height 0.52s cubic-bezier(0.4,0,0.2,1)' }}>
          {CARD_DEFS.map(({ w1, w2 }, i) => {
            const pos         = positions[i];
            const spreadDelay = `${i * 60}ms`;
            const enterDelay  = `${i * 90}ms`;
            const isHidden    = !entered && !spread;
            const translateY  = isHidden ? '28px' : '0px';
            const cardOpacity = isHidden ? 0 : pos.opacity;
            return (
              <div key={i} style={{
                position: 'absolute', left: 0, right: 0, height: CARD_H,
                top: pos.top,
                transform: `scale(${pos.scale}) translateY(${translateY})`,
                transformOrigin: 'center top',
                opacity: cardOpacity,
                zIndex: spread ? 1 : (3 - i),
                background: c.surface, borderRadius: 16, padding: '12px 14px',
                boxShadow: '0 2px 8px rgba(0,0,0,0.07)',
                transition: [
                  `top 0.52s cubic-bezier(0.4,0,0.2,1) ${spread ? spreadDelay : '0ms'}`,
                  `transform 0.52s cubic-bezier(0.4,0,0.2,1) ${spread ? spreadDelay : enterDelay}`,
                  `opacity 0.45s ease ${spread ? '0ms' : enterDelay}`,
                ].join(', '),
              }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 11 }}>
                  <div className={shimmer ? 'shimmer-bg' : ''} style={{ width: 17, height: 17, borderRadius: 9, background: shimmer ? undefined : '#c4c4cc', flexShrink: 0, marginTop: 2 }} />
                  <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
                    <div className={shimmer ? 'shimmer-bg' : ''} style={{ height: 12, borderRadius: 4, width: w1, background: shimmer ? undefined : '#c8c8d0' }} />
                    <div className={shimmer ? 'shimmer-bg' : ''} style={{ height: 10, borderRadius: 4, width: w2, background: shimmer ? undefined : '#d4d4dc' }} />
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ── Plan card ───────────────────────────────────────────────────

    function PlanCard({ plan, selected, onSelect }) {
      return (
        <div onClick={onSelect} style={{
          background: c.surface, borderRadius: 16,
          border: selected ? `2px solid ${c.accent}` : '2px solid transparent',
          padding: '12px 16px', cursor: 'pointer',
          transition: 'border-color 0.15s',
        }}>
          {plan.badge && (
            <div style={{ display: 'inline-flex', alignItems: 'center', background: plan.badgeBg || c.bdg, borderRadius: 8, padding: '3px 10px', marginBottom: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: plan.badgeColor || c.bdgTxt, fontFamily: "'Calibre',sans-serif" }}>{plan.badge}</span>
            </div>
          )}
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <div style={{ width: 20, height: 20, borderRadius: 10, flexShrink: 0, marginTop: 4, border: selected ? `6px solid ${c.accent}` : `2px solid ${c.div}`, background: c.surface, transition: 'border 0.15s' }} />
            <div style={{ flex: 1 }}>
              <p style={{ fontFamily: "'Calibre',sans-serif", color: c.text, margin: '0 0 3px' }}>
                <span style={{ fontSize: 20, fontWeight: 600 }}>{plan.payment}</span>
                <span style={{ fontSize: 15, color: c.sub }}>{' '}{plan.frequency}</span>
              </p>
              <div style={{ display: 'flex', gap: 8, fontSize: 15, color: c.sub, fontFamily: "'Calibre',sans-serif" }}>
                <span>{plan.interest}</span><span>·</span><span>{plan.due}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── iOS bottom sheet nav bar ────────────────────────────────────
    // Structure (from Figma 6129:47042):
    //   0–119px:  dark overlay rgba(20,22,27,0.9)
    //   54–129px: grey pill #d5d5d9, borderRadius 36
    //   62–129px: white bar #f3f4f2, rounded top corners
    //             ↳ Affirm logo centered, cancel button left:20

    function NavBarApple({ onCancel }) {
      return (
        <div style={{ position: 'relative', height: 129, flexShrink: 0 }}>
          {/* Dark overlay — full width, semi-transparent over wallet */}
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 119, background: 'rgba(20,22,27,0.9)' }} />
          {/* Grey pill — inset 16px each side, peeks narrower than white bar to show wallet peeking behind */}
          <div style={{ position: 'absolute', top: 54, left: 16, right: 16, height: 75, borderRadius: 36, background: '#c8c8cc' }} />
          {/* White rounded bar — full width */}
          <div style={{
            position: 'absolute', top: 62, left: 0, right: 0, height: 67,
            borderTopLeftRadius: 36, borderTopRightRadius: 36,
            background: '#f3f4f2',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <img src="./affirm-logo.svg" style={{ height: 40, width: 'auto' }} />
            <button
              onClick={onCancel}
              style={{
                position: 'absolute', left: 20,
                width: 36, height: 36, borderRadius: 18,
                background: 'white', border: 'none',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 1px 6px rgba(0,0,0,0.14)',
                cursor: 'pointer',
              }}
            >
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M1 1l10 10M11 1L1 11" stroke="#1c1c1e" strokeWidth="2" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    // ── Purchasing Power Education screen ──────────────────────────

    function PurchasingPowerScreen({ onClose }) {
      return (
        <div style={{ animation: 'fadeIn 0.3s ease', display: 'flex', flexDirection: 'column' }}>
          {/* Page-level × close — sits below NavBarApple's × */}
          <button
            onClick={onClose}
            style={{
              alignSelf: 'flex-start', background: 'rgba(120,120,128,0.14)', border: 'none',
              borderRadius: 999, width: 30, height: 30, display: 'flex', alignItems: 'center',
              justifyContent: 'center', cursor: 'pointer', marginBottom: 20, padding: 0,
            }}
          >
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M1 1l10 10M11 1L1 11" stroke={c.text} strokeWidth="1.8" strokeLinecap="round"/>
            </svg>
          </button>

          {/* Battery illustration */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
            <img src="./pp-battery.svg" style={{ width: 144, height: 'auto' }} />
          </div>

          {/* Heading */}
          <h2 style={{ fontFamily: "'Calibre', sans-serif", fontWeight: 500, fontSize: 28, color: c.text, lineHeight: '34px', margin: '0 0 12px' }}>
            What's purchasing power?
          </h2>

          {/* Intro */}
          <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 18, color: c.sub, lineHeight: '27px', margin: '0 0 12px' }}>
            It's a snapshot of the estimated amount you could spend with Affirm right now.
          </p>
          <p style={{ fontFamily: "'Calibre', sans-serif", fontWeight: 500, fontSize: 18, color: c.text, lineHeight: '27px', margin: '0 0 8px' }}>
            It's different from a credit limit because:
          </p>
          {[
            'It updates regularly based on your activity',
            'It can vary by merchant and purchase category',
          ].map((item, i) => (
            <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 6 }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ marginTop: 5, flexShrink: 0 }}>
                <path d="M4 8.5l2.5 2.5L12 5" stroke={c.accent} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 17, color: c.text, lineHeight: '26px', margin: 0 }}>{item}</p>
            </div>
          ))}

          {/* Accordion card */}
          <div style={{ background: 'white', borderRadius: 16, overflow: 'hidden', margin: '20px 0 16px' }}>
            {/* Section 1 */}
            <div style={{ padding: '14px 16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <span style={{ fontFamily: "'Calibre', sans-serif", fontWeight: 500, fontSize: 17, color: c.text, lineHeight: '25px' }}>
                  What goes into my number?
                </span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M3 10.5l5-5 5 5" stroke={c.sub} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              {[
                'Your payment history with Affirm',
                'How much credit you're currently using',
                'The merchant you're shopping with',
              ].map((item, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 6 }}>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ marginTop: 4, flexShrink: 0 }}>
                    <path d="M5 8h6M8 5l3 3-3 3" stroke={c.sub} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 16, color: c.sub, lineHeight: '24px', margin: 0 }}>{item}</p>
                </div>
              ))}
            </div>

            {/* Divider */}
            <div style={{ height: 1, background: c.div, margin: '0 16px' }} />

            {/* Section 2 */}
            <div style={{ padding: '14px 16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <span style={{ fontFamily: "'Calibre', sans-serif", fontWeight: 500, fontSize: 17, color: c.text, lineHeight: '25px' }}>
                  Why does it change?
                </span>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0 }}>
                  <path d="M3 10.5l5-5 5 5" stroke={c.sub} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
              {/* Graph card */}
              <div style={{ background: c.bg, borderRadius: 12, padding: '12px 14px', marginBottom: 12 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                  <div style={{ width: 28, height: 28, borderRadius: 8, background: c.bdg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M7 1L3 8h4l-1 5 5-7H7l1-5z" fill={c.bdgTxt}/>
                    </svg>
                  </div>
                  <span style={{ fontFamily: "'Calibre', sans-serif", fontWeight: 500, fontSize: 14, color: c.text }}>Purchasing power</span>
                </div>
                <img src="./pp-changes.svg" style={{ width: '100%', height: 'auto', display: 'block' }} />
                <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 12, color: c.sub, margin: '6px 0 0', textAlign: 'center' }}>
                  for illustrative purposes only
                </p>
              </div>
              <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 16, color: c.sub, lineHeight: '24px', margin: '0 0 8px' }}>
                Your purchasing power changes based on:
              </p>
              {[
                'Making on-time payments can increase it',
                'Missing payments or taking on more credit can lower it',
                'It may vary by merchant and purchase category',
              ].map((item, i) => (
                <div key={i} style={{ display: 'flex', gap: 10, marginBottom: 6 }}>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ marginTop: 4, flexShrink: 0 }}>
                    <path d="M5 8h6M8 5l3 3-3 3" stroke={c.sub} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 16, color: c.sub, lineHeight: '24px', margin: 0 }}>{item}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Legal */}
          <p style={{ fontFamily: "'Calibre', sans-serif", fontSize: 14, color: c.sub, lineHeight: '21px', margin: '0 0 20px' }}>
            Purchasing power is an estimate and is not a guarantee of credit approval. Actual loan amounts are subject to eligibility, credit approval, and the{' '}
            <span style={{ color: c.link, textDecoration: 'underline' }}>terms and conditions</span>{' '}
            of your loan agreement. Loans are made by{' '}
            <span style={{ color: c.link, textDecoration: 'underline' }}>Affirm's lending partners</span>.
          </p>

          {/* Got it CTA */}
          <button
            onClick={onClose}
            style={{
              width: '100%', background: '#000049', color: 'white', border: 'none',
              borderRadius: 999, height: 48, fontSize: 18, fontWeight: 500,
              fontFamily: "'Calibre', sans-serif", cursor: 'pointer', marginBottom: 8,
            }}
          >
            Got it
          </button>
        </div>
      );
    }

    // ── Apple Wallet screen ─────────────────────────────────────────

    function WalletScreen({ phase, rawAmt, onChoosePlan }) {
      const [cardErr, setCardErr] = useState(false);
      const isComplete  = phase === 'wallet-complete';
      const displayAmt  = parseFloat(rawAmt || '0');

      return (
        <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: '#ebebed' }}>
          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            {/* Status bar — dark text on light background */}
            <div style={{ height: 44, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 28px' }}>
              <span style={{ color: '#1c1c1e', fontSize: 15, fontWeight: 600, fontFamily: 'system-ui, sans-serif' }}>9:41</span>
              <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                {/* Signal bars */}
                <svg width="18" height="12" viewBox="0 0 18 12" fill="#1c1c1e">
                  <rect x="0" y="7" width="3" height="5" rx="0.5"/>
                  <rect x="5" y="4.5" width="3" height="7.5" rx="0.5"/>
                  <rect x="10" y="2" width="3" height="10" rx="0.5"/>
                  <rect x="15" y="0" width="3" height="12" rx="0.5" fillOpacity="0.3"/>
                </svg>
                {/* WiFi */}
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                  <circle cx="8" cy="11" r="1.5" fill="#1c1c1e"/>
                  <path d="M4 7.5C5.3 6.1 6.6 5.5 8 5.5s2.7.6 4 2" stroke="#1c1c1e" strokeWidth="1.5" strokeLinecap="round"/>
                  <path d="M1 4.5C3.2 2.2 5.5 1 8 1s4.8 1.2 7 3.5" stroke="#1c1c1e" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
                {/* Battery */}
                <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                  <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1c1c1e" strokeOpacity="0.35"/>
                  <rect x="2" y="2" width="17" height="8" rx="2" fill="#1c1c1e"/>
                  <path d="M23 4v4a2 2 0 000-4z" fill="#1c1c1e" fillOpacity="0.4"/>
                </svg>
              </div>
            </div>

            {/* iOS Wallet header — X button left, pill right */}
            <div style={{ height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 20px' }}>
              <button style={{ width: 36, height: 36, borderRadius: 18, background: 'white', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 1px 6px rgba(0,0,0,0.14)', flexShrink: 0 }}>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M1 1l10 10M11 1L1 11" stroke="#1c1c1e" strokeWidth="2" strokeLinecap="round"/>
                </svg>
              </button>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, background: 'white', borderRadius: 20, padding: '7px 14px', boxShadow: '0 1px 6px rgba(0,0,0,0.14)' }}>
                {/* Card reader icon */}
                <svg width="18" height="13" viewBox="0 0 18 13" fill="none">
                  <rect x="0.5" y="0.5" width="17" height="12" rx="2.5" stroke="#1c1c1e" strokeOpacity="0.6"/>
                  <rect x="0" y="3.5" width="18" height="2.5" fill="#1c1c1e" fillOpacity="0.5"/>
                  <rect x="2" y="8" width="4" height="2" rx="0.5" fill="#1c1c1e" fillOpacity="0.5"/>
                </svg>
                <span style={{ fontSize: 18, color: '#1c1c1e', letterSpacing: 2, lineHeight: 1 }}>•••</span>
              </div>
            </div>

            {/* Affirm card */}
            <div style={{ padding: '2px 20px 12px' }}>
              {!cardErr ? (
                <img
                  src="./affirm-card.png"
                  style={{ width: '100%', borderRadius: 14, display: 'block', boxShadow: '0 8px 28px rgba(0,0,0,0.22)' }}
                  onError={() => setCardErr(true)}
                />
              ) : (
                <div style={{ width: '100%', height: 212, background: 'linear-gradient(135deg, #0d0d60 0%, #1818a0 50%, #080840 100%)', borderRadius: 14, boxShadow: '0 8px 28px rgba(0,0,0,0.22)', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', padding: '20px 22px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                    <span style={{ fontSize: 26, fontWeight: 800, color: 'white', fontFamily: "'Axiforma for Affirm', sans-serif" }}>affirm</span>
                    <div style={{ width: 36, height: 24, borderRadius: 4, background: 'rgba(255,255,255,0.25)', border: '1px solid rgba(255,255,255,0.3)' }} />
                  </div>
                  <div>
                    <p style={{ color: 'rgba(255,255,255,0.55)', fontSize: 11, fontFamily: 'system-ui', margin: '0 0 6px', letterSpacing: 1.5, textTransform: 'uppercase' }}>Debit/Flex Visa</p>
                    <p style={{ color: 'white', fontSize: 16, fontFamily: 'system-ui', letterSpacing: 3, margin: 0 }}>•••• •••• •••• 8046</p>
                  </div>
                </div>
              )}
            </div>

            {/* Pay Later / Choose a Plan row */}
            <div style={{ margin: '0 20px' }}>
              <div
                onClick={!isComplete ? onChoosePlan : undefined}
                style={{
                  background: 'white', borderRadius: 16, padding: '12px 16px',
                  cursor: isComplete ? 'default' : 'pointer',
                  display: 'flex', alignItems: 'center', gap: 12,
                  boxShadow: '0 1px 6px rgba(0,0,0,0.1)',
                }}
              >
                {/* Filled purple circle with clock */}
                <div style={{ width: 44, height: 44, borderRadius: 22, background: '#CB30E0', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="9" stroke="white" strokeWidth="1.8"/>
                    <path d="M12 7.5v4.5l3 2" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
                {/* Stacked text */}
                <div>
                  <p style={{ fontSize: 13, color: '#8e8e93', fontFamily: 'system-ui, sans-serif', margin: '0 0 2px', fontWeight: 400 }}>Pay Later</p>
                  <p style={{ fontSize: 16, fontWeight: 600, color: '#1c1c1e', fontFamily: 'system-ui, sans-serif', margin: 0 }}>
                    {isComplete && displayAmt > 0
                      ? `Purchases up to $${displayAmt.toFixed(2)}`
                      : 'Choose a Plan'}
                    {' '}
                    <span style={{ color: '#8e8e93', fontSize: 14, fontWeight: 400 }}>◇</span>
                  </p>
                </div>
              </div>
            </div>

            {/* Home indicator */}
            <div style={{ marginTop: 'auto', display: 'flex', justifyContent: 'center', padding: '10px 0 20px' }}>
              <div style={{ width: 134, height: 5, background: '#1c1c1e', borderRadius: 3, opacity: 0.2 }} />
            </div>
          </div>
        </div>
      );
    }

    // ── Main app ────────────────────────────────────────────────────
    // Phase state machine:
    //   'wallet' → 'input' → 'loading' → 'terms' → 'review' → 'wallet-complete'
    //   cancel from any Affirm screen → 'wallet'

    function App() {
      const timerRefs = React.useRef([]);
      const clearAllTimers = () => { timerRefs.current.forEach(clearTimeout); timerRefs.current = []; };

      const [phase, setPhase]               = useState('wallet');
      const [rawAmt, setRawAmt]             = useState('');
      const [amtError, setAmtError]         = useState(false);
      const [kbOpen, setKbOpen]             = useState(false);
      const [spread, setSpread]             = useState(false);
      const [shimmer, setShimmer]           = useState(false);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [cardTopPx, setCardTopPx]       = useState(CARD_TOP_INPUT);
      const [cardMoveDur, setCardMoveDur]   = useState('0ms');
      const [ghostOpacity, setGhostOpacity] = useState(1);
      const [termsVisible, setTermsVisible]         = useState(false);
      const [deckEntered, setDeckEntered]           = useState(false);
      const [autopay, setAutopay]                   = useState(true);
      const [disclosureChecked, setDisclosureChecked] = useState(false);
      const [isConfirming, setIsConfirming]         = useState(false);
      const [headingTransition, setHeadingTransition] = useState(null);
      // 'input-exit'   — input heading animating out
      // 'loading-exit' — loading heading animating out

      // Fire deck entrance animation whenever input phase begins
      useEffect(() => {
        if (phase === 'input') {
          const t = setTimeout(() => setDeckEntered(true), 350);
          return () => clearTimeout(t);
        }
      }, [phase]);

      const sheetOpen = !['wallet', 'wallet-complete', 'modal'].includes(phase);
      const isModal   = phase === 'modal';
      const isLoading = phase === 'loading';
      const isTerms   = phase === 'terms';
      const isReview  = phase === 'review';

      const amt        = parseFloat(rawAmt) || 0;
      const hasAmt     = amt > 0;
      const fmt        = n => n.toFixed(2);
      const interest6  = amt * 0.05;
      const interest12 = amt * 0.088;

      const plans = [
        { id: 'p4',  payment: `$${fmt(amt / 4)}`,               frequency: 'every 2 weeks · 4 payments', interest: '$0 interest',              due: '$0 due today', badge: '0% APR',        badgeBg: c.bg, badgeColor: c.sub },
        { id: 'p6',  payment: `$${fmt((amt + interest6) / 6)}`, frequency: 'per month · 6 months',       interest: `$${fmt(interest6)} interest`,  due: '$0 due today' },
        { id: 'p12', payment: `$${fmt((amt + interest12) / 12)}`,frequency: 'per month · 12 months',     interest: `$${fmt(interest12)} interest`, due: '$0 due today', badge: 'Lowest monthly', badgeBg: c.bg, badgeColor: c.sub },
      ];

      const selectedPlanData = plans.find(p => p.id === selectedPlan);
      const interestAmt      = selectedPlan === 'p6' ? interest6 : selectedPlan === 'p12' ? interest12 : 0;
      const total            = amt + interestAmt;

      // Tapping "Choose a Plan" on wallet → show modal
      const handleOpenModal = () => setPhase('modal');

      // Tapping "Choose a Plan" inside modal → open Affirm sheet
      const handleOpenSheet = () => {
        clearAllTimers();
        setRawAmt('');
        setKbOpen(true);
        setSpread(false);
        setShimmer(false);
        setSelectedPlan(null);
        setCardTopPx(CARD_TOP_INPUT);
        setCardMoveDur('0ms');
        setGhostOpacity(1);
        setTermsVisible(false);
        setDeckEntered(false);
        setAutopay(true);
        setDisclosureChecked(false);
        setIsConfirming(false);
        setAmtError(false);
        setHeadingTransition(null);
        setPhase('input');
      };

      const handleCancel = () => {
        clearAllTimers();
        setKbOpen(false);
        setIsConfirming(false);
        setAmtError(false);
        setHeadingTransition(null);
        setPhase('wallet');
      };

      const handleSeePlans = () => {
        if (!hasAmt) { setAmtError(true); return; }
        clearAllTimers();
        setKbOpen(false);

        // ── Step 1 (t=0): input heading slides up and out; cards start moving ──
        setHeadingTransition('input-exit');
        setCardMoveDur('320ms');
        setCardTopPx(CARD_TOP_LOADING);
        setSpread(true);

        timerRefs.current = [
          // ── Step 2 (t=280ms): switch to loading, loading heading slides up and in ──
          setTimeout(() => { setHeadingTransition(null); setPhase('loading'); }, 280),
          // ── Step 3 (t=640ms): shimmer on ghost cards ──
          setTimeout(() => setShimmer(true), 640),
          // ── Step 4 (t=5000ms): loading heading slides up and out ──
          setTimeout(() => setHeadingTransition('loading-exit'), 5000),
          // ── Step 5 (t=5280ms): terms heading slides in; ghost cards start fading ──
          setTimeout(() => { setHeadingTransition(null); setTermsVisible(true); setGhostOpacity(0); setSelectedPlan('p4'); }, 5280),
          // ── Step 6 (t=5730ms): switch phase after ghost fade-out completes ──
          setTimeout(() => setPhase('terms'), 5730),
        ];
      };

      const handleKey = k => {
        setAmtError(false);
        if (k === '⌫') { setRawAmt(p => p.slice(0, -1)); return; }
        if (k === '.') { if (!rawAmt.includes('.')) setRawAmt(p => p + k); return; }
        if (rawAmt.length < 7) setRawAmt(p => p + k);
      };

      const numpadRows = [['1','2','3'],['4','5','6'],['7','8','9'],['.',  '0','⌫']];

      // ── Review screen helpers ───────────────────────────────────────
      const paymentCount = selectedPlan === 'p4' ? 4 : selectedPlan === 'p6' ? 6 : 12;
      const planFreqDisplay = selectedPlan === 'p4' ? 'every 2 weeks' : selectedPlan === 'p6' ? 'per month for 6 months' : 'per month for 12 months';

      const getTimelineDates = () => {
        const base = new Date(2026, 3, 8); // April 8, 2026
        const fmtDate = d => {
          const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          return `${mo[d.getMonth()]} ${d.getDate()}${d.getFullYear() !== 2026 ? ', ' + d.getFullYear() : ''}`;
        };
        if (selectedPlan === 'p4') {
          // 4 payments ≤4: show all 4 (no ellipsis)
          return [14, 28, 42, 56].map(days => {
            const d = new Date(base); d.setDate(d.getDate() + days); return fmtDate(d);
          });
        }
        // >4 payments: show items 1, 2, then ellipsis placeholder, then last
        const months = selectedPlan === 'p6' ? 6 : 12;
        const a = new Date(base); a.setMonth(a.getMonth() + 1);
        const b = new Date(base); b.setMonth(b.getMonth() + 2);
        const last = new Date(base); last.setMonth(last.getMonth() + months);
        return [fmtDate(a), fmtDate(b), fmtDate(last)]; // index 2 = last (ellipsis rendered before it)
      };
      const timelineDates = selectedPlan ? getTimelineDates() : ['', '', ''];

      return (
        <div className="phone">
          {/* ── Wallet layer (always underneath) ── */}
          <WalletScreen phase={phase} rawAmt={rawAmt} onChoosePlan={handleOpenModal} />

          {/* ── "Choose a Plan" modal overlay ──
               Blurs the wallet behind it (iOS frosted glass style).
               Appears between wallet and Affirm sheet. */}
          <div style={{
            position: 'absolute', inset: 0, zIndex: 15,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(0,0,0,0.18)',
            backdropFilter: 'blur(18px)',
            WebkitBackdropFilter: 'blur(18px)',
            opacity: isModal ? 1 : 0,
            pointerEvents: isModal ? 'auto' : 'none',
            transition: 'opacity 0.25s ease',
          }}>
            {/* Tap outside to dismiss */}
            <div style={{ position: 'absolute', inset: 0 }} onClick={() => setPhase('wallet')} />
            {/* Action sheet card */}
            <div style={{
              position: 'relative', width: 342, borderRadius: 34,
              background: 'rgba(242,242,247,0.88)',
              backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
              boxShadow: '0 8px 40px rgba(0,0,0,0.18)',
              padding: '14px 14px 14px',
              zIndex: 1,
              transform: isModal ? 'scale(1) translateY(0)' : 'scale(0.94) translateY(12px)',
              transition: 'transform 0.28s cubic-bezier(0.4,0,0.2,1)',
            }}>
              {/* Header row: icon + title */}
              <div style={{ display: 'flex', gap: 16, alignItems: 'center', padding: '8px 8px 12px' }}>
                <div style={{ width: 36, height: 36, borderRadius: 999, background: '#f2f2f7', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                    <circle cx="10" cy="10" r="8" stroke="#8e8e93" strokeWidth="1.8"/>
                    <path d="M10 6.5v3.8l2.5 1.7" stroke="#8e8e93" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </div>
                <div>
                  <p style={{ fontSize: 16, fontWeight: 400, color: '#000', fontFamily: 'system-ui, sans-serif', margin: '0 0 1px', lineHeight: 1.3 }}>Pay Later</p>
                  <p style={{ fontSize: 16, fontWeight: 600, color: '#000', fontFamily: 'system-ui, sans-serif', margin: 0, lineHeight: 1.3 }}>Choose a Plan</p>
                </div>
              </div>
              {/* Description */}
              <p style={{ fontSize: 17, color: 'rgba(60,60,67,0.6)', fontFamily: 'system-ui, sans-serif', margin: '0 8px 14px', lineHeight: 1.5, letterSpacing: '-0.4px' }}>
                Choose a payment plan now for your purchase.
              </p>
              {/* CTA button */}
              <button
                onClick={handleOpenSheet}
                style={{
                  width: '100%', background: 'rgba(120,120,128,0.16)', color: '#000',
                  border: 'none', borderRadius: 100, padding: '13px 16px',
                  fontSize: 17, fontWeight: 500, fontFamily: 'system-ui, sans-serif',
                  cursor: 'pointer', letterSpacing: '-0.4px',
                }}
              >
                Choose a Plan
              </button>
            </div>
          </div>

          {/* ── Affirm bottom sheet overlay ──
               Transparent background so wallet shows through the dark NavBar overlay.
               Slides up/down over the wallet. */}
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', flexDirection: 'column',
            transform: sheetOpen ? 'translateY(0)' : 'translateY(100%)',
            transition: 'transform 0.42s cubic-bezier(0.4,0,0.2,1)',
            zIndex: 20,
            overflow: 'hidden',
            background: 'transparent',
            pointerEvents: sheetOpen ? 'auto' : 'none',
          }}>
            <NavBarApple onCancel={handleCancel} />

            {/* ── Content area ── */}
            <div style={{
              flex: 1,
              overflowY: (isTerms || isReview || phase === 'purchasing-power') ? 'auto' : 'hidden',
              background: c.bg,
              padding: '14px 16px 20px',
              position: 'relative',
            }}>

              {/* Purchasing power education screen */}
              {phase === 'purchasing-power' && (
                <PurchasingPowerScreen onClose={() => setPhase('input')} />
              )}

              {/* Input screen — Version B: stacked CTA with down arrow */}
              {(phase === 'input' || headingTransition === 'input-exit') && (
                <div style={{
                  animation: headingTransition === 'input-exit'
                    ? 'slideUpOut 280ms cubic-bezier(0.4,0,0.2,1) forwards'
                    : 'slideUpIn 320ms cubic-bezier(0.4,0,0.2,1) both',
                }}>
                  <h1 style={{ fontFamily: "'Axiforma for Affirm',sans-serif", fontWeight: 700, fontSize: 18, color: c.text, margin: '2px 0 10px', lineHeight: 1.35 }}>
                    See payment plans for:
                  </h1>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 2, marginBottom: amtError ? 4 : 8 }}>
                    <span style={{ fontFamily: "'Axiforma for Affirm',sans-serif", fontWeight: 700, fontSize: 52, lineHeight: 1, color: amtError ? '#b4193f' : c.text }}>$</span>
                    {/* Cursor before placeholder when empty, after digits when typing */}
                    {/* width:0 + borderLeft means zero flex contribution → same $-to-number gap as typed state */}
                    {!rawAmt && (
                      <span style={{ width: 0, borderLeft: '2.5px solid #4A4AF4', height: 50, animation: 'blink 1s step-end infinite', alignSelf: 'center' }} />
                    )}
                    <span style={{ fontFamily: "'Axiforma for Affirm',sans-serif", fontWeight: 700, fontSize: 52, lineHeight: 1, color: rawAmt ? c.text : '#b1b1be', minWidth: 4 }}>
                      {rawAmt || '50'}
                    </span>
                    {rawAmt && kbOpen && (
                      <span style={{ width: 0, borderLeft: '2.5px solid #4A4AF4', height: 50, animation: 'blink 1s step-end infinite', alignSelf: 'center', marginLeft: 1 }} />
                    )}
                  </div>
                  {/* Error message */}
                  {amtError && (
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: '#b4193f', margin: '0 0 6px', lineHeight: '24px' }}>
                      Please enter an amount.
                    </p>
                  )}
                  {/* Caption — stacked above CTA */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4, margin: '0 0 14px' }}>
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 14, color: c.sub, margin: 0, lineHeight: 1.5 }}>
                      Enter an estimate to see options. Spend up to $4,000.
                    </p>
                    <button
                      onClick={() => setPhase('purchasing-power')}
                      style={{ background: 'none', border: 'none', padding: '0 2px', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', flexShrink: 0 }}
                    >
                      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="7" stroke={c.sub} strokeWidth="1.5"/>
                        <path d="M8 7.5v4" stroke={c.sub} strokeWidth="1.5" strokeLinecap="round"/>
                        <circle cx="8" cy="4.75" r="0.85" fill={c.sub}/>
                      </svg>
                    </button>
                  </div>
                  {/* Stacked CTA with down arrow — always active */}
                  <button
                    onClick={handleSeePlans}
                    style={{
                      display: 'inline-flex', alignItems: 'center', gap: 8,
                      background: c.accent, color: 'white', border: 'none', borderRadius: 999,
                      padding: '11px 22px', fontSize: 16, fontWeight: 500, fontFamily: "'Calibre',sans-serif",
                      cursor: 'pointer',
                      marginBottom: 14,
                    }}
                  >
                    Show me plans
                    {/* Down arrow icon */}
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M7 1v10M2 7l5 5 5-5" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </button>
                </div>
              )}

              {/* Loading heading — Version B: slides up in on enter, slides up out on exit */}
              {(isLoading || headingTransition === 'loading-exit') && !termsVisible && (
                <div style={{
                  animation: headingTransition === 'loading-exit'
                    ? 'slideUpOut 280ms cubic-bezier(0.4,0,0.2,1) forwards'
                    : 'slideUpIn 320ms cubic-bezier(0.4,0,0.2,1) both',
                  marginBottom: 22,
                }}>
                  <h1 style={{ fontFamily: "'Axiforma for Affirm',sans-serif", fontWeight: 700, fontSize: 22, color: c.text, margin: '2px 0 6px', lineHeight: 1.3 }}>
                    Loading plans for ${rawAmt}
                  </h1>
                  <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub }}>
                    This may take a few seconds…
                  </p>
                </div>
              )}

              {/* Terms content — heading slides up in; cards fade in (no movement) */}
              {termsVisible && !isReview && (
                <div>
                  <div style={{ animation: 'slideUpIn 320ms cubic-bezier(0.4,0,0.2,1) both' }}>
                    <h1 style={{ fontFamily: "'Axiforma for Affirm',sans-serif", fontWeight: 700, fontSize: 20, color: c.text, margin: '2px 0 6px', lineHeight: 1.3 }}>
                      Payment plans for ${fmt(amt)}
                    </h1>
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub, margin: '0 0 16px' }}>
                      We're not big on fees, so we don't charge any.
                    </p>
                  </div>
                  <div style={{ animation: 'fadeIn 0.45s ease 0.08s both', display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
                    {plans.map(plan => (
                      <PlanCard key={plan.id} plan={plan} selected={selectedPlan === plan.id} onSelect={() => setSelectedPlan(plan.id)} />
                    ))}
                  </div>
                  <div style={{ animation: 'fadeIn 0.4s ease 0.18s both' }}>
                    <div style={{ marginBottom: 12 }}>
                      {[['Purchase amount', `$${fmt(amt)}`, false], ['Total of payments', `$${fmt(total)}`, true]].map(([label, val, bold]) => (
                        <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0' }}>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub }}>{label}</span>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, fontWeight: bold ? 600 : 400, color: c.text }}>{val}</span>
                        </div>
                      ))}
                    </div>
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 14, color: c.sub, margin: '0 0 6px', lineHeight: 1.5 }}>
                      <span style={{ color: c.link, textDecoration: 'underline' }}>Plans are subject</span> to final eligibility and approval.
                    </p>
                  </div>
                </div>
              )}

              {/* Review content — matches production StreamlinedCheckout layout */}
              {isReview && selectedPlanData && (
                <div style={{ animation: 'fadeIn 0.3s ease', opacity: isConfirming ? 0.6 : 1, transition: 'opacity 0.3s ease', pointerEvents: isConfirming ? 'none' : 'auto' }}>

                  {/* ReviewHeader — back button (DisclosureLeft) + "Review payment plan" H1
                      font-size-medium=24px, font-weight-medium=500, line-height-medium=30px */}
                  <button
                    onClick={() => setPhase('terms')}
                    style={{ display: 'flex', alignItems: 'center', background: 'none', border: 'none', padding: 0, cursor: 'pointer', marginBottom: 16 }}
                  >
                    {/* DisclosureLeft chevron */}
                    <svg width="9" height="16" viewBox="0 0 9 16" fill="none" style={{ marginRight: 8, flexShrink: 0 }}>
                      <path d="M7.5 1L1 8L7.5 15" stroke={c.text} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    <span style={{ fontFamily: "'Calibre',sans-serif", fontWeight: 500, fontSize: 24, color: c.text, lineHeight: '30px' }}>
                      Review payment plan
                    </span>
                  </button>

                  {/* InstallmentDetails — Panel: calendar icon left (margin-right 12px) + content right
                      padding: 12px 16px, border-radius: 16px, margin-top: 0 (already spaced above) */}
                  <div style={{ background: c.surface, borderRadius: 16, padding: '12px 16px', marginBottom: 12 }}>
                    <div style={{ display: 'flex' }}>
                      {/* CalendarDates icon — 24x24, margin-right 12px */}
                      <div style={{ marginRight: 12, marginTop: 2, flexShrink: 0 }}>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                          <rect x="3" y="4" width="18" height="17" rx="3" stroke={c.text} strokeWidth="1.6"/>
                          <path d="M8 2v4M16 2v4" stroke={c.text} strokeWidth="1.6" strokeLinecap="round"/>
                          <path d="M3 9h18" stroke={c.text} strokeWidth="1.6"/>
                        </svg>
                      </div>
                      <div style={{ flex: 1 }}>
                        {/* Title: installmentTitleFormattedSchumerBox — Body 18px, weight 500 */}
                        <p style={{ fontFamily: "'Calibre',sans-serif", fontWeight: 500, fontSize: 18, color: c.text, margin: '0 0 2px', lineHeight: '26px' }}>
                          {selectedPlanData.payment} {planFreqDisplay}
                        </p>
                        {/* Subtitle: "N payments" — Subhead 16px */}
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>
                          {paymentCount} payments
                        </span>

                        {/* InstallmentTimelinePreview — margin-top 12px
                            Items flex row, gap spacing-medium=16px (spacing-large=24px on ≥390px)
                            For >4 installments: show items 1,2 then Ellipses then last */}
                        <div style={{ display: 'flex', alignItems: 'center', marginTop: 12 }}>
                          <div style={{ display: 'flex', alignItems: 'center', flex: 1 }}>
                            {timelineDates.map((date, i) => {
                              const SIZE = 40;
                              const cx = SIZE / 2;
                              const cy = SIZE / 2;
                              const radius = SIZE * 0.35;
                              const circ = 2 * Math.PI * radius;
                              const strokeWidth = SIZE * 0.11;
                              // percentage: installmentNumber/total for non-last, 1 for last
                              const pct = i === timelineDates.length - 1 ? 1 : (i + 1) / paymentCount;
                              const dashoffset = circ * (1 - pct);
                              return (
                                <React.Fragment key={i}>
                                  {/* Ellipses: shown before the last item when >4 payments (p6=3 items, p12=3 items) */}
                                  {i === timelineDates.length - 1 && paymentCount > 4 && (
                                    <div style={{ display: 'flex', alignItems: 'center', marginRight: 16, paddingBottom: 20 }}>
                                      {[0,1,2].map(d => (
                                        <div key={d} style={{ width: 3, height: 3, borderRadius: 999, background: c.sub, margin: '0 3px' }} />
                                      ))}
                                    </div>
                                  )}
                                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginRight: i < timelineDates.length - 1 ? 16 : 0 }}>
                                    {/* InstallmentProgressIcon — SVG progress arc, 40x40 */}
                                    <svg width={SIZE} height={SIZE}>
                                      {/* Background ring */}
                                      <circle cx={cx} cy={cy} r={radius} fill="none" stroke="#e2e2e6" strokeWidth={strokeWidth} />
                                      {/* Progress arc */}
                                      <g transform={`rotate(-90 ${cx} ${cy})`}>
                                        {/* White outline for contrast */}
                                        <circle cx={cx} cy={cy} r={radius} fill="none"
                                          stroke="white"
                                          strokeWidth={strokeWidth + strokeWidth * 0.4}
                                          strokeDasharray={circ}
                                          strokeDashoffset={dashoffset}
                                          strokeLinecap="round"
                                        />
                                        {/* Accent arc */}
                                        <circle cx={cx} cy={cy} r={radius} fill="none"
                                          stroke={c.accent}
                                          strokeWidth={strokeWidth}
                                          strokeDasharray={circ}
                                          strokeDashoffset={dashoffset}
                                          strokeLinecap="round"
                                        />
                                      </g>
                                    </svg>
                                    {/* Date label — Subhead 16px, text-align center, no-wrap */}
                                    <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px', textAlign: 'center', whiteSpace: 'nowrap', marginTop: 2 }}>
                                      {date}
                                    </span>
                                  </div>
                                </React.Fragment>
                              );
                            })}
                          </div>
                          {/* ChevronRight */}
                          <svg width="8" height="14" viewBox="0 0 8 14" fill="none" style={{ flexShrink: 0, marginBottom: 20 }}>
                            <path d="M1 1l6 6-6 6" stroke={c.sub} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        </div>

                        {/* Footer: "These due dates are close estimates." — Subhead 16px, supplementary */}
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub, lineHeight: '24px' }}>
                          These due dates are close estimates.
                        </span>
                      </div>
                    </div>
                  </div>

                  {/* TilBox — Panel: receipt icon left (margin-right 11px) + line items right
                      padding: 12px 16px, margin-top: 12px (spacing-smedium) */}
                  <div style={{ background: c.surface, borderRadius: 16, padding: '12px 16px', marginBottom: 16 }}>
                    <div style={{ display: 'flex' }}>
                      {/* Receipt icon — margin-right spacing-smedium=11px */}
                      <div style={{ marginRight: 11, marginTop: 3, flexShrink: 0 }}>
                        <svg width="20" height="22" viewBox="0 0 24 24" fill="none">
                          <path d="M4 2v20l4-3 4 3 4-3 4 3V2" stroke={c.text} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                          <path d="M8 8h8M8 12h5" stroke={c.text} strokeWidth="1.6" strokeLinecap="round"/>
                        </svg>
                      </div>
                      {/* Line items */}
                      <div style={{ flex: 1 }}>
                        {/* Due today — isFirst isEmphasized: Headline 20px, fw500, marginBottom spacing-small=8px */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8 }}>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 20, fontWeight: 500, color: c.text, lineHeight: '24px' }}>Due today</span>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 20, fontWeight: 500, color: c.text, lineHeight: '24px' }}>$0.00</span>
                        </div>
                        {/* Purchase amount — Subhead 16px, marginBottom spacing-x-small=4px */}
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>Purchase amount</span>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>${fmt(amt)}</span>
                        </div>
                        {/* Interest line — only if interest > 0 */}
                        {interestAmt > 0 && (
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                            <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>Interest ({selectedPlan === 'p6' ? '17.9' : '15.0'}% APR)</span>
                            <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>${fmt(interestAmt)}</span>
                          </div>
                        )}
                        {/* Total of payments — last item, marginBottom 0 */}
                        <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>Total of payments</span>
                          <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>${fmt(total)}</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* AutopayToggle — margin: spacing-medium=16px 0 (none)
                      Title (Body 18px, fw500) + InfoIcon + Toggle switch on the right */}
                  <div style={{ margin: '16px 0' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      {/* TitleContainer */}
                      <div style={{ display: 'flex', alignItems: 'center' }}>
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 18, fontWeight: 500, color: c.text, lineHeight: '26px', marginRight: 8 }}>
                          AutoPay (optional)
                        </span>
                        {/* InfoIconModal trigger */}
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                          <circle cx="10" cy="10" r="9" stroke={c.sub} strokeWidth="1.4"/>
                          <path d="M10 9v5" stroke={c.sub} strokeWidth="1.4" strokeLinecap="round"/>
                          <circle cx="10" cy="6.5" r="0.9" fill={c.sub}/>
                        </svg>
                      </div>
                      {/* iOS-style toggle */}
                      <div
                        onClick={() => setAutopay(a => !a)}
                        style={{
                          width: 51, height: 31, borderRadius: 16, flexShrink: 0,
                          background: autopay ? '#34C759' : '#e2e2e6',
                          position: 'relative', cursor: 'pointer',
                          transition: 'background 0.2s',
                        }}
                      >
                        <div style={{
                          position: 'absolute', top: 2,
                          left: autopay ? 22 : 2,
                          width: 27, height: 27, borderRadius: 14,
                          background: 'white', boxShadow: '0 2px 6px rgba(0,0,0,0.25)',
                          transition: 'left 0.2s',
                        }} />
                      </div>
                    </div>
                  </div>

                  {/* PaymentInstrumentOptionsDropdown — bank account selector */}
                  {autopay && (
                    <div style={{ background: c.surface, borderRadius: 12, padding: '12px 14px', marginBottom: 24 }}>
                      <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 13, fontWeight: 500, color: c.sub, margin: '0 0 2px', letterSpacing: 0.3, textTransform: 'uppercase' }}>
                        Payment Method · ACH
                      </p>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 18, color: c.text, lineHeight: '26px' }}>Bank account 5635</span>
                        <svg width="14" height="8" viewBox="0 0 14 8" fill="none">
                          <path d="M1 1l6 6 6-6" stroke={c.sub} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                      </div>
                    </div>
                  )}

                  {/* Divider — margin spacing-large=24px 0 */}
                  <div style={{ height: 1, background: c.div, margin: '0 0 24px' }} />

                  {/* GoReviewDisclosures — conditional on plan type */}

                  {interestAmt === 0 ? (
                    /* 0% APR plan: single paragraph, no checkbox */
                    <div style={{ marginBottom: 24 }}>
                      <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>
                        By continuing, you have reviewed and agree to the{' '}
                        <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>AutoPay Authorization</span>
                        {', the '}
                        <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>Payment Agreement & Disclosures</span>
                        {', and the merchant refund policy.'}
                      </span>
                    </div>
                  ) : (
                    /* Interest-bearing plan: AutoPay line + checkbox */
                    <>
                      <div style={{ marginBottom: 16 }}>
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px' }}>
                          By confirming, you agree to the{' '}
                          <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>AutoPay Authorization</span>.
                        </span>
                      </div>
                      <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
                        <div
                          onClick={() => setDisclosureChecked(d => !d)}
                          style={{
                            width: 20, height: 20, borderRadius: 4, flexShrink: 0, marginTop: 2,
                            border: `1.5px solid ${disclosureChecked ? c.accent : '#a0a0b4'}`,
                            background: disclosureChecked ? c.accent : 'white',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            cursor: 'pointer', transition: 'all 0.15s',
                          }}
                        >
                          {disclosureChecked && (
                            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
                              <path d="M1 4.5l3 3.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                            </svg>
                          )}
                        </div>
                        <span style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.text, lineHeight: '24px', flex: 1 }}>
                          I have reviewed and agree to the{' '}
                          <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>Truth in Lending Disclosure</span>
                          {', the '}
                          <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>Loan Agreement</span>
                          {', the merchant refund policy, and have received the '}
                          <span style={{ fontWeight: 600, color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>Credit Score Disclosure</span>.
                        </span>
                      </div>
                    </>
                  )}

                  {/* CalloutBanner (ApplePayInStoreCalloutBanner)
                      background: surface-primary (white), border-radius: spacing-medium=16px, padding: spacing-medium=16px
                      Title: Body 18px fw500, marginBottom spacing-x-small=4px
                      Description: Subhead 16px, supplementary color */}
                  <div style={{ background: c.surface, borderRadius: 16, padding: 16, marginBottom: 8 }}>
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontWeight: 500, fontSize: 18, color: c.text, margin: '0 0 4px', lineHeight: '26px' }}>
                      Activate, then head to checkout
                    </p>
                    <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub, margin: 0, lineHeight: '24px' }}>
                      Your plan won't start until you complete your purchase.
                    </p>
                  </div>

                </div>
              )}
            </div>

            {/* ── Continue to review CTA ── */}
            {termsVisible && !isReview && selectedPlan && (
              <div style={{ padding: '10px 16px', flexShrink: 0, borderTop: `1px solid ${c.div}`, background: c.bg, animation: 'fadeIn 0.3s ease' }}>
                <button
                  onClick={() => setPhase('review')}
                  style={{ width: '100%', background: c.accent, color: 'white', border: 'none', borderRadius: 999, padding: '14px 24px', fontSize: 18, fontWeight: 500, fontFamily: "'Calibre',sans-serif", cursor: 'pointer' }}
                >
                  Continue to review
                </button>
              </div>
            )}

            {/* ── Accept terms CTA ── */}
            {isReview && (
              <div style={{ padding: '10px 16px', flexShrink: 0, borderTop: `1px solid ${c.div}`, background: c.bg }}>
                <button
                  disabled={isConfirming}
                  onClick={() => {
                    setIsConfirming(true);
                    setTimeout(() => {
                      setIsConfirming(false);
                      setKbOpen(false);
                      setPhase('wallet-complete');
                    }, 2500);
                  }}
                  style={{
                    width: '100%', background: c.accent, color: 'white', border: 'none',
                    borderRadius: 999, padding: '14px 24px', fontSize: 18, fontWeight: 500,
                    fontFamily: "'Calibre',sans-serif",
                    cursor: isConfirming ? 'default' : 'pointer',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    minHeight: 52,
                  }}
                >
                  {isConfirming ? (
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ animation: 'spin 0.75s linear infinite' }}>
                      <circle cx="12" cy="12" r="9.5" stroke="rgba(255,255,255,0.35)" strokeWidth="2.5"/>
                      <path d="M12 2.5a9.5 9.5 0 0 1 9.5 9.5" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
                    </svg>
                  ) : 'Accept terms & continue'}
                </button>
                {isConfirming && (
                  <p style={{ fontFamily: "'Calibre',sans-serif", fontSize: 16, color: c.sub, textAlign: 'center', margin: '8px 0 0', lineHeight: '24px' }}>
                    This may take a few seconds
                  </p>
                )}
              </div>
            )}

            <HomeIndicator />

            {/* ── Ghost card absolutely-positioned layer ──
                 Sits inside the sheet, decoupled from scroll content.
                 Hidden once real plan cards appear (terms/review phase). */}
            {phase !== 'terms' && phase !== 'review' && (
              <div style={{
                position: 'absolute',
                left: 16, right: 16,
                top: (phase === 'input' && amtError) ? cardTopPx + 30 : cardTopPx,
                transition: `top ${cardMoveDur} cubic-bezier(0.4,0,0.2,1), opacity 0.45s ease`,
                opacity: ghostOpacity,
                zIndex: 5,
                pointerEvents: 'none',
              }}>
                <AnimatedGhostStack spread={spread} shimmer={shimmer} entered={deckEntered} />
              </div>
            )}

            {/* ── Keyboard overlay ── */}
            <div style={{
              position: 'absolute', bottom: 0, left: 0, right: 0,
              transform: kbOpen ? 'translateY(0)' : 'translateY(110%)',
              transition: 'transform 0.28s cubic-bezier(0.4,0,0.2,1)',
              zIndex: 10,
            }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 3, padding: '6px 3px 4px', background: '#cfd0d5' }}>
                {numpadRows.map((row, ri) =>
                  row.map(key => (
                    <button key={`${ri}-${key}`} onClick={() => handleKey(key)} style={{ padding: '14px 8px', background: key === '⌫' ? '#adb0b9' : '#ffffff', border: 'none', borderRadius: 8, fontSize: 22, fontWeight: 400, color: c.text, fontFamily: 'system-ui, sans-serif', boxShadow: '0 1px 0 rgba(0,0,0,0.3)' }}>
                      {key}
                    </button>
                  ))
                )}
              </div>
              <div style={{ display: 'flex', justifyContent: 'center', paddingTop: 8, paddingBottom: 14, background: '#cfd0d5' }}>
                <div style={{ width: 134, height: 5, background: '#333', borderRadius: 3, opacity: 0.2 }} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
