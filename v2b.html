<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Pay In-Store — V2B: Submit to Load</title>
  <style>
    @font-face {
      font-family: 'Calibre';
      src: url('https://www.affirm.com/fonts/src/calibre-regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Calibre';
      src: url('https://www.affirm.com/fonts/src/calibre-medium.woff2') format('woff2');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Calibre';
      src: url('https://www.affirm.com/fonts/src/calibre-semibold.woff2') format('woff2');
      font-weight: 600; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Axiforma for Affirm';
      src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Axiforma for Affirm';
      src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm-Medium.woff2') format('woff2');
      font-weight: 500; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Axiforma for Affirm';
      src: url('https://www.affirm.com/fonts/src/AxiformaforAffirm-Bold.woff2') format('woff2');
      font-weight: 700; font-style: normal; font-display: swap;
    }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Figma capture support -->
  <script>
    if (window.location.hash.includes('figmacapture=')) {
      var s = document.createElement('script');
      s.src = 'https://mcp.figma.com/mcp/html-to-design/capture.js';
      s.async = true;
      document.head.appendChild(s);
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px 64px;
      font-family: 'Calibre', system-ui, -apple-system, sans-serif;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #f2f2f4;
      border-radius: 52px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 10px #2a2a2a, 0 0 0 11px #444;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    ::-webkit-scrollbar { display: none; }
    button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    button:active { opacity: 0.8; }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer  { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .fade-in { animation: fadeIn 0.25s ease forwards; }
    .shimmer-bar {
      background: linear-gradient(90deg, #e2e2e6 25%, #ededf1 50%, #e2e2e6 75%);
      background-size: 400px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <div style="width:390px;margin-bottom:20px;display:flex;flex-direction:column;gap:4px">
    <h1 style="font-family:'Axiforma for Affirm',sans-serif;font-weight:700;font-size:20px;color:white;opacity:0.9">
      Apple Pay In-Store — V2B
    </h1>
    <p style="font-family:'Calibre',sans-serif;font-size:13px;color:rgba(255,255,255,0.45)">
      Submit-to-load variant · compact CTA · empty state · shimmer loading
    </p>
  </div>

  <div id="root-v2b"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Design tokens ──────────────────────────────────────────────
    const c = {
      bg:      '#f2f2f4',
      surface: '#ffffff',
      nav:     '#f3f4f2',
      text:    '#0c0c14',
      sub:     '#4b4b5c',
      accent:  '#000061',
      link:    '#000061',
      bdg:     '#e2e2ff',
      bdgTxt:  '#4242cf',
      div:     '#cbcbd4',
      infoBg:  '#f0f0ff',
      greenBg: '#eaf7f0',
      greenTxt:'#1a6644',
      warn:    '#fcf9e8',
    };

    // ── Shared primitives ──────────────────────────────────────────

    function NavBar({ onBack, backLabel = 'Back' }) {
      return (
        <div style={{
          background: c.nav,
          borderTopLeftRadius: 28,
          borderTopRightRadius: 28,
          height: 68,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          position: 'relative',
          flexShrink: 0,
        }}>
          {onBack && (
            <button onClick={onBack} style={{
              position: 'absolute', left: 16,
              background: 'rgba(0,0,0,0.07)',
              border: '1.5px solid rgba(255,255,255,0.6)',
              borderRadius: 999,
              padding: '6px 12px',
              display: 'flex', alignItems: 'center', gap: 3,
              color: c.text, fontSize: 16,
              fontFamily: "'Calibre', sans-serif",
              fontWeight: 500,
            }}>
              ‹ {backLabel}
            </button>
          )}
          <div style={{
            background: 'white',
            borderRadius: 10,
            padding: '7px 14px',
            boxShadow: '0 1px 4px rgba(0,0,0,0.08)',
          }}>
            <span style={{
              fontSize: 21, fontWeight: 800,
              color: c.text,
              fontFamily: "'Axiforma for Affirm', sans-serif",
              letterSpacing: '-0.3px',
            }}>affirm</span>
          </div>
        </div>
      );
    }

    function PrimaryBtn({ children, onClick, disabled }) {
      return (
        <button onClick={onClick} disabled={disabled} style={{
          width: '100%',
          background: disabled ? '#9b9be8' : c.accent,
          color: 'white',
          border: 'none',
          borderRadius: 10,
          padding: '14px 24px',
          fontSize: 18,
          fontWeight: 600,
          fontFamily: "'Calibre', sans-serif",
          transition: 'background 0.15s',
        }}>
          {children}
        </button>
      );
    }

    function Badge({ label, bg = c.bdg, color = c.bdgTxt }) {
      return (
        <div style={{
          display: 'inline-flex', alignItems: 'center',
          background: bg, borderRadius: 8,
          padding: '3px 10px',
          marginBottom: 8,
        }}>
          <span style={{
            fontSize: 14, fontWeight: 500, color,
            fontFamily: "'Calibre', sans-serif",
          }}>{label}</span>
        </div>
      );
    }

    function HomeIndicator() {
      return (
        <div style={{
          display: 'flex', justifyContent: 'center',
          paddingTop: 10, paddingBottom: 18,
          background: c.bg, flexShrink: 0,
        }}>
          <div style={{
            width: 134, height: 5,
            background: c.text, borderRadius: 3, opacity: 0.2,
          }} />
        </div>
      );
    }

    // ── Plan card ──────────────────────────────────────────────────

    function PlanCard({ plan, selected, onSelect }) {
      return (
        <div onClick={onSelect} style={{
          background: c.surface, borderRadius: 16,
          border: selected ? `2px solid ${c.accent}` : '2px solid transparent',
          padding: '12px 16px',
          cursor: 'pointer',
          transition: 'border-color 0.15s',
        }}>
          {plan.badge && (
            <Badge label={plan.badge} bg={plan.badgeBg || c.bdg} color={plan.badgeColor || c.bdgTxt} />
          )}
          <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
            <div style={{
              width: 20, height: 20, borderRadius: 10, flexShrink: 0, marginTop: 5,
              border: selected ? `6px solid ${c.accent}` : `2px solid ${c.div}`,
              background: c.surface,
              transition: 'border 0.15s',
            }} />
            <div style={{ flex: 1 }}>
              <p style={{ fontFamily: "'Calibre', sans-serif", color: c.text, margin: '0 0 4px' }}>
                <span style={{ fontSize: 20, fontWeight: 600 }}>{plan.payment}</span>
                <span style={{ fontSize: 17 }}>{' '}{plan.frequency}</span>
              </p>
              <div style={{
                display: 'flex', gap: 8, flexWrap: 'wrap',
                fontSize: 16, color: c.sub,
                fontFamily: "'Calibre', sans-serif",
              }}>
                <span>{plan.interest}</span>
                <span>·</span>
                <span>{plan.due}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Ghost plan card (empty state) ──────────────────────────────

    function GhostPlanCard({ widths = ['58%', '38%'] }) {
      return (
        <div style={{
          background: c.surface, borderRadius: 16,
          padding: '12px 16px',
          display: 'flex', gap: 12, alignItems: 'flex-start',
          opacity: 0.55,
        }}>
          <div style={{
            width: 20, height: 20, borderRadius: 10,
            background: c.div, flexShrink: 0, marginTop: 4,
          }} />
          <div style={{ flex: 1 }}>
            <div style={{
              background: c.div, borderRadius: 4,
              height: 15, width: widths[0], marginBottom: 7,
            }} />
            <div style={{
              background: '#e8e8ec', borderRadius: 4,
              height: 13, width: widths[1],
            }} />
          </div>
        </div>
      );
    }

    function GhostPlansEmpty() {
      return (
        <div>
          <p style={{
            fontFamily: "'Calibre', sans-serif",
            fontWeight: 600, fontSize: 17,
            color: c.sub, margin: '0 0 10px',
            opacity: 0.5,
          }}>Your plans</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <GhostPlanCard widths={['60%', '40%']} />
            <GhostPlanCard widths={['55%', '35%']} />
            <GhostPlanCard widths={['64%', '44%']} />
          </div>
          <p style={{
            fontFamily: "'Calibre', sans-serif",
            fontSize: 13, color: c.sub,
            textAlign: 'center',
            margin: '14px 0 0',
            opacity: 0.65,
          }}>
            Enter an amount to see your payment options
          </p>
        </div>
      );
    }

    // ── Breadcrumb (variant B) ────────────────────────────────────

    function Breadcrumb() {
      const steps = ['Enter amount', 'See plans', 'Review'];
      return (
        <div style={{
          display: 'flex', alignItems: 'center',
          marginBottom: 14,
        }}>
          {steps.map((label, i) => (
            <React.Fragment key={i}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0 }}>
                <div style={{
                  width: 20, height: 20, borderRadius: 10,
                  background: i === 0 ? c.accent : c.div,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <span style={{
                    fontSize: 11, fontWeight: 700, color: 'white',
                    fontFamily: "'Calibre', sans-serif",
                  }}>{i + 1}</span>
                </div>
                <span style={{
                  fontSize: 13,
                  fontWeight: i === 0 ? 600 : 400,
                  color: i === 0 ? c.text : c.sub,
                  fontFamily: "'Calibre', sans-serif",
                  opacity: i === 0 ? 1 : 0.5,
                  whiteSpace: 'nowrap',
                }}>{label}</span>
              </div>
              {i < steps.length - 1 && (
                <div style={{
                  flex: 1, height: 1.5,
                  background: c.div,
                  margin: '0 7px',
                  minWidth: 10,
                }} />
              )}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // ── Up Next card (variant C) ───────────────────────────────────

    function UpNextCard() {
      return (
        <div>
          <div style={{ height: 1, background: c.div, marginBottom: 14 }} />
          <p style={{
            fontFamily: "'Calibre', sans-serif",
            fontSize: 11, fontWeight: 600, color: c.sub,
            textTransform: 'uppercase', letterSpacing: '0.7px',
            margin: '0 0 8px', opacity: 0.6,
          }}>Up next</p>
          <div style={{
            background: c.surface,
            borderRadius: 14,
            padding: '13px 14px',
            display: 'flex', alignItems: 'center', gap: 12,
            border: `1.5px dashed ${c.div}`,
          }}>
            <div style={{
              width: 36, height: 36, borderRadius: 10,
              background: c.infoBg,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
              fontSize: 18, lineHeight: 1,
            }}>✦</div>
            <div style={{ flex: 1 }}>
              <p style={{
                fontFamily: "'Calibre', sans-serif",
                fontWeight: 600, fontSize: 16,
                color: c.text, margin: '0 0 2px',
              }}>Choose from 3 payment plans</p>
              <p style={{
                fontFamily: "'Calibre', sans-serif",
                fontSize: 14, color: c.sub, margin: 0,
              }}>Pay in 4, 6, or 12 installments</p>
            </div>
            <span style={{ color: c.div, fontSize: 22, lineHeight: 1 }}>›</span>
          </div>
        </div>
      );
    }

    // ── Mini card row (variant D) ──────────────────────────────────

    function MiniCardRow() {
      const cards = [
        { w1: '64%', w2: '42%' },
        { w1: '56%', w2: '36%' },
        { w1: '70%', w2: '46%' },
      ];
      return (
        <div>
          <div style={{ height: 1, background: c.div, marginBottom: 14 }} />
          <p style={{
            fontFamily: "'Calibre', sans-serif",
            fontSize: 14, color: c.sub,
            margin: '0 0 10px', opacity: 0.6,
          }}>Enter an amount to see your plans:</p>
          <div style={{ display: 'flex', gap: 8 }}>
            {cards.map(({ w1, w2 }, i) => (
              <div key={i} style={{
                flex: 1,
                background: c.surface,
                borderRadius: 12,
                padding: '10px',
                opacity: 0.5,
              }}>
                <div style={{
                  width: 14, height: 14, borderRadius: 7,
                  background: '#d0d0da', marginBottom: 8,
                }} />
                <div style={{
                  background: '#d8d8de', borderRadius: 3,
                  height: 9, width: w1, marginBottom: 5,
                }} />
                <div style={{
                  background: '#e4e4ea', borderRadius: 3,
                  height: 8, width: w2,
                }} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── Shimmer card (loading state) ───────────────────────────────

    function ShimmerCard() {
      return (
        <div style={{
          background: c.surface, borderRadius: 16,
          padding: '12px 16px',
          display: 'flex', gap: 12, alignItems: 'flex-start',
        }}>
          <div className="shimmer-bar" style={{
            width: 20, height: 20, borderRadius: 10,
            flexShrink: 0, marginTop: 4,
          }} />
          <div style={{ flex: 1 }}>
            <div className="shimmer-bar" style={{
              borderRadius: 4, height: 15, width: '62%', marginBottom: 7,
            }} />
            <div className="shimmer-bar" style={{
              borderRadius: 4, height: 13, width: '42%',
            }} />
          </div>
        </div>
      );
    }

    // ── SCREEN: Plan Creation B ────────────────────────────────────
    // Submit-to-load variant. Phase: 'input' → 'loading' → 'loaded'

    function PlanCreationScreenB({ onChoosePlan, variant = 'A' }) {
      // Support ?phase=loaded URL param for Figma capture
      const urlParams = new URLSearchParams(window.location.search);
      const initPhase  = urlParams.get('phase') || 'input';
      const kbClosed   = urlParams.get('kbclosed') === '1';
      const initAmt    = urlParams.get('amt') || (initPhase !== 'input' || kbClosed ? '100' : '');

      const [rawAmt, setRawAmt]           = useState(initAmt);
      const [phase, setPhase]             = useState(initPhase);
      const [selectedPlan, setSelectedPlan] = useState(initPhase === 'loaded' ? 'biweekly' : null);
      const [keyboardOpen, setKeyboardOpen] = useState(initPhase === 'input' && !kbClosed);

      const amt    = parseFloat(rawAmt) || 0;
      const hasAmt = amt > 0;

      const numpadRows = [['1','2','3'],['4','5','6'],['7','8','9'],['.',  '0','⌫']];

      const handleKey = (k) => {
        if (k === '⌫') {
          setRawAmt(p => p.slice(0, -1));
        } else if (k === '.') {
          if (!rawAmt.includes('.')) setRawAmt(p => p + k);
        } else {
          if (rawAmt.length < 7) setRawAmt(p => p + k);
        }
      };

      const handleSubmit = () => {
        if (!hasAmt) return;
        setKeyboardOpen(false);
        setPhase('loading');
        setTimeout(() => {
          setPhase('loaded');
          setSelectedPlan('biweekly');
        }, 2200);
      };

      const handleEditAmount = () => {
        setPhase('input');
        setSelectedPlan(null);
        setKeyboardOpen(true);
      };

      const fmt = n => n.toFixed(2);

      const plans = [
        {
          id: 'biweekly',
          payment: `$${fmt(amt / 4)}`,
          frequency: 'every 2 weeks for 8 weeks',
          interest: '$0 interest',
          due: '$0 due today',
          badge: '0% APR',
          badgeBg: c.bdg,
          badgeColor: c.bdgTxt,
        },
        {
          id: 'monthly6',
          payment: `$${fmt(amt / 6)}`,
          frequency: 'every month for 6 months',
          interest: `$${fmt(amt * 0.05)} interest`,
          due: '$0 due today',
        },
        {
          id: 'monthly12',
          payment: `$${fmt(amt / 12)}`,
          frequency: 'every month for 12 months',
          interest: `$${fmt(amt * 0.044)} interest`,
          due: '$0 due today',
          badge: 'Lowest monthly payment',
          badgeBg: c.bg,
          badgeColor: c.sub,
        },
      ];

      const selPlan = plans.find(p => p.id === selectedPlan);
      const interest = !selectedPlan || selectedPlan === 'biweekly' ? 0
        : selectedPlan === 'monthly6' ? amt * 0.05 : amt * 0.044;
      const total = amt + interest;

      return (
        <div style={{
          flex: 1, display: 'flex', flexDirection: 'column',
          background: c.bg, position: 'relative', overflow: 'hidden',
        }}>
          <NavBar />

          {/* Scrollable body */}
          <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px 16px' }}>

            {/* ── Step breadcrumb (variant B only) ── */}
            {variant === 'B' && <Breadcrumb />}

            {/* ── Page heading ── */}
            <h1 style={{
              fontFamily: "'Axiforma for Affirm', sans-serif",
              fontWeight: 700, fontSize: 18,
              color: c.text, margin: '2px 0 14px',
              lineHeight: 1.35,
            }}>
              Show me payment plans for
            </h1>

            {/* ── Amount area ── */}
            {phase === 'input' ? (
              <div>
                {/* Large amount display */}
                <div style={{
                  display: 'flex', alignItems: 'baseline', gap: 2,
                  marginBottom: 10,
                }}>
                  <span style={{
                    fontFamily: "'Axiforma for Affirm', sans-serif",
                    fontWeight: 700, fontSize: 52, lineHeight: 1,
                    color: rawAmt ? c.text : '#c0c0c8',
                  }}>$</span>
                  <span style={{
                    fontFamily: "'Axiforma for Affirm', sans-serif",
                    fontWeight: 700, fontSize: 52, lineHeight: 1,
                    color: rawAmt ? c.text : '#c0c0c8',
                    minWidth: 4,
                  }}>
                    {rawAmt || <span style={{ opacity: 0.45 }}>0</span>}
                  </span>
                  {keyboardOpen && (
                    <span style={{
                      width: 2.5, height: 50,
                      background: c.accent, borderRadius: 2,
                      animation: 'blink 1s step-end infinite',
                      alignSelf: 'center', marginLeft: 1,
                    }} />
                  )}
                </div>

                {/* Purchasing power + CTA on same row */}
                <div style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  marginBottom: 20,
                }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ flexShrink: 0 }}>
                      <path fillRule="evenodd" clipRule="evenodd" d="M10.1255 0.877899C10.7474 0.78009 11.3768 1.0009 11.8014 1.46576C12.1206 1.81541 12.2079 2.32198 12.2487 2.80343C12.2918 3.31184 12.2918 3.98903 12.2918 4.83643V4.86822V6.33332C12.2918 6.69367 12.2923 6.92634 12.3068 7.10342C12.3206 7.27321 12.3442 7.33616 12.3599 7.36707C12.4198 7.48467 12.5155 7.58028 12.6331 7.6402C12.664 7.65595 12.7269 7.67949 12.8967 7.69337C13.0738 7.70783 13.3065 7.70832 13.6668 7.70832H14.1722H14.2038C14.843 7.70831 15.366 7.7083 15.7702 7.74502C16.1695 7.78129 16.5802 7.86074 16.9024 8.11793C17.3487 8.47416 17.6083 9.01433 17.6077 9.58535C17.6072 9.9976 17.4127 10.368 17.1916 10.7024C16.9677 11.041 16.641 11.4494 16.2417 11.9485L16.222 11.9731L12.3832 16.7716L12.3634 16.7964C11.834 17.4581 11.411 17.9869 11.0597 18.357C10.7271 18.7074 10.3425 19.0485 9.87478 19.1221C9.25289 19.2199 8.62342 18.9991 8.19891 18.5342C7.87961 18.1846 7.7924 17.678 7.75157 17.1965C7.70845 16.6881 7.70846 16.0109 7.70846 15.1635V15.1318V13.6667C7.70846 13.3063 7.70798 13.0736 7.69351 12.8966C7.67964 12.7268 7.65609 12.6638 7.64034 12.6329C7.58042 12.5153 7.48481 12.4197 7.36721 12.3598C7.33631 12.344 7.27336 12.3205 7.10357 12.3066C6.92648 12.2921 6.69381 12.2917 6.33346 12.2917H5.82805H5.79645C5.15723 12.2917 4.63431 12.2917 4.23011 12.255C3.83079 12.2187 3.42005 12.1392 3.09786 11.882C2.65158 11.5258 2.39196 10.9856 2.39258 10.4146C2.39302 10.0024 2.58757 9.632 2.8087 9.29753C3.03253 8.95897 3.35922 8.55063 3.75855 8.05148L3.77827 8.02683L7.61702 3.22839L7.63685 3.2036C8.16622 2.54187 8.58926 2.01307 8.94054 1.64299C9.27318 1.29255 9.65774 0.951465 10.1255 0.877899Z" fill={c.accent} />
                    </svg>
                    <p style={{
                      fontFamily: "'Calibre', sans-serif",
                      fontSize: 14, color: c.sub, margin: 0,
                    }}>
                      <span style={{ color: c.link, textDecoration: 'underline', cursor: 'pointer' }}>Spend</span>
                      {' '}up to $4,000
                    </p>
                  </div>

                  <button
                    onClick={handleSubmit}
                    disabled={!hasAmt}
                    style={{
                      background: hasAmt ? c.accent : '#d0d0da',

                  flex: 1,
                  background: variant === v.id ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.05)',
                  border: variant === v.id ? '1px solid rgba(255,255,255,0.35)' : '1px solid rgba(255,255,255,0.1)',
                  borderRadius: 8, padding: '7px 4px',
                  fontSize: 11, fontWeight: variant === v.id ? 600 : 400,
                  color: variant === v.id ? 'white' : 'rgba(255,255,255,0.4)',
                  fontFamily: "'Calibre', sans-serif",
                  cursor: 'pointer',
                }}>{v.label}</button>
              ))}
            </div>
          </div>

          {/* Screen nav tabs */}
          <div style={{ width: 390, display: 'flex', gap: 6 }}>
            {tabs.map(tab => {
              const active = screen === tab.id || (screen === 'storeSelect' && tab.id === 'stores');
              return (
                <button key={tab.id} onClick={() => setScreen(tab.id === 'stores' ? 'storeSelect' : tab.id)} style={{
                  flex: 1,
                  background: active ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)',
                  border: active ? '1px solid rgba(255,255,255,0.3)' : '1px solid rgba(255,255,255,0.1)',
                  borderRadius: 8, padding: '8px 4px',
                  fontSize: 12, fontWeight: 500,
                  color: active ? 'white' : 'rgba(255,255,255,0.45)',
                  fontFamily: "'Calibre', sans-serif",
                  cursor: 'pointer', whiteSpace: 'nowrap',
                }}>{tab.label}</button>
              );
            })}
          </div>

          <div className="phone">
            {screen === 'plan' && (
              <PlanCreationScreenB
                variant={variant}
                onChoosePlan={(p, a) => { setPlan(p); setAmount(a); setScreen('review'); }}
              />
            )}
            {screen === 'storeSelect' && (
              <StoreSelectionScreen
                onSelect={(name) => { setStoreName(name); setScreen('plan'); }}
                onBack={() => setScreen('plan')}
                onSkip={() => { setStoreName(null); setScreen('plan'); }}
              />
            )}
            {screen === 'review' && (
              <ReviewScreen
                plan={plan}
                amount={amount}
                storeName={storeName}
                onBack={() => setScreen('plan')}
                onConfirm={() => setScreen('success')}
              />
            )}
            {screen === 'success' && (
              <SuccessScreen onReset={() => { setScreen('plan'); setStoreName(null); setPlan(null); setAmount(0); }} />
            )}
          </div>
        </div>
      );
    }

    const styleEl = document.createElement('style');
    styleEl.textContent = `
      @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    `;
    document.head.appendChild(styleEl);

    ReactDOM.createRoot(document.getElementById('root-v2b')).render(<App />);
  </script>
</body>
</html>
